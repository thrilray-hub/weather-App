<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="/weather-App/css/style.css">
</head>
<body>
    
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City Name" spellcheck="false">
           <button> <img src="/weather-App/assets/images/search.webp" alt=""> </button>
        </div>

        <div class="error">Input a Valid City Name</div>

    <div class="weather">
        <img class="weather_icon" src="./weather-App/assets/images/clear.webp" alt="">
        <h1 class="temp">22°c</h1>
        <h2 class="city">Adelaide</h2>
 
    <div class="details">
    <div class="col">
        <img src="/weather-App/assets/images/humidity.webp" alt="">
        <div>
            <p class="humidity">70%</p>
            <p>Humidity</p>
        </div>
    </div>

        <div class="col">
        <img src="/weather-App/assets/images/wind.webp" alt="">
        <div>
            <p class="wind">12 km/h</p>
            <p>Wind Speed</p>
        </div>
    </div>
    </div>

    </div>

    <script src="/weather-App/script.js"></script>
</body>
</html>
